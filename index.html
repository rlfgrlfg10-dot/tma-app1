<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mira</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --blue-light: #5DADE2;
    --blue-dark: #2C3E50;
    --bg-dark: #0F1419;
    --text-light: #FFFFFF;
    --text-dim: rgba(255,255,255,0.5);
    --sep: rgba(255,255,255,0.1);
    --purple: #9C27B0;
  }

  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e40af 0%, #0f172a 60%, #020617 100%) !important;
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    min-height: 100vh !important;
    height: auto !important;
    overflow-y: scroll !important;
    -webkit-overflow-scrolling: touch !important;
  }

  /* ── SCREENS ──────────────────────────────── */
  .screen { display: none; width: 100%; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── AGENT SCREEN ─────────────────────────── */
  #screen-agent {
    position: relative;
    width: 100%;
  }

  /* Top header bar */
  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    position: relative;
    z-index: 10;
  }

  .btn-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-light);
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-circle:active { opacity: 0.7; }

  .pro-button {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #9C27B0;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .pro-button:active { opacity: 0.85; }

  .balance-button {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    color: var(--text-light);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
    justify-content: center;
  }
  .balance-button:active { opacity: 0.7; }

  /* Main content area */
  .agent-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px 32px;
    scrollbar-width: none;
  }
  .agent-content::-webkit-scrollbar { display: none; }

  .agent-title {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.3;
    letter-spacing: -0.3px;
  }

  /* Input area */
  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .chat-input {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 15px 22px;
    color: var(--text-light);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    resize: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .chat-input::placeholder {
    color: rgba(255,255,255,0.45);
  }
  .chat-input:focus {
    border-color: rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.25);
  }

  .send-button {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    font-size: 18px;
  }
  .send-button:active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.25);
  }

  /* Action buttons */
  .action-buttons {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .action-btn {
    flex: 1;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 11px 14px;
    color: var(--text-light);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active {
    background: rgba(0,0,0,0.3);
    border-color: rgba(255,255,255,0.2);
  }

  .chat-button {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 11px 14px;
    color: var(--text-light);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .chat-button:active {
    background: rgba(0,0,0,0.3);
    border-color: rgba(255,255,255,0.2);
  }

  /* Gallery section - inside main screen */
  .gallery-section {
    width: 100%;
    padding: 24px 0;
    background: var(--bg-dark);
    border-top: 1px solid var(--sep);
  }

  .gallery-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    margin-bottom: 14px;
  }

  .gallery-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-light);
  }

  .gallery-link {
    font-size: 14px;
    color: #5DADE2;
    font-weight: 500;
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .gallery-link:active { opacity: 0.7; }

  .gallery-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 16px;
    scrollbar-width: none;
  }
  .gallery-scroll::-webkit-scrollbar { display: none; }

  .gallery-item {
    flex-shrink: 0;
    width: 140px;
    height: 140px;
    border-radius: 20px;
    background: #222;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .gallery-item:active { transform: scale(0.96); }

  .gallery-item-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .gallery-item-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    backdrop-filter: blur(6px);
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
  }

  .gallery-icon { font-size: 14px; }

  /* Gen / Profile screens */
  #screen-gen, #screen-profile {
    background: var(--bg-dark);
    overflow-y: auto;
    padding: 20px 16px;
    padding-bottom: 100px;
  }

  .screen-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text-light);
  }

  .gen-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .gen-icon { font-size: 32px; flex-shrink: 0; }
  .gen-info { flex: 1; }
  .gen-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; color: var(--text-light); }
  .gen-info p { font-size: 13px; color: var(--text-dim); }

  .btn-disabled {
    background: rgba(255,255,255,0.1);
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: default;
    white-space: nowrap;
  }

  /* ── BOTTOM NAV ───────────────────────────– */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: rgba(15,20,25,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--sep);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    font-weight: 500;
    padding: 8px 12px;
    position: relative;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 46px;
    height: 36px;
    background: linear-gradient(90deg, #5DADE2, #4A9FD8);
    border-radius: 18px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    opacity: 0;
    z-index: -1;
  }

  .nav-btn.active::before {
    transform: translateX(-50%) scaleX(1);
    opacity: 1;
  }

  .nav-btn svg {
    width: 22px;
    height: 22px;
    transition: filter 0.2s;
  }

  .nav-btn.active {
    color: var(--text-light);
  }

  .nav-btn.active svg {
    filter: drop-shadow(0 0 6px rgba(93,173,226,0.4));
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(0,0,0,0.85);
    color: var(--text-light);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Skeleton */
  .skel {
    background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
    background-size: 200% 100%;
    animation: skel 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- SCREEN 1: АГЕНТ -->
<div id="screen-agent" class="screen active">
  <div class="agent-header">
    <button class="btn-circle" onclick="openBot('profile')" title="Profile">👤</button>
    <button class="pro-button" onclick="doTopup()">⚡ Купить Mira Pro</button>
    <button class="balance-button" id="balance-btn">
      <span>💰</span>
      <span id="balance-display">0</span>
    </button>
  </div>

  <div class="agent-content">
    <div class="agent-title">Чем я могу помочь Вам сегодня?</div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="chat-input" placeholder="Спросить что-нибудь..." rows="1"></textarea>
        <button class="send-button" onclick="sendMessage()">↑</button>
      </div>

      <div class="action-buttons">
        <button class="action-btn" onclick="openBot('gen_photo')">🖼 Создать фото</button>
        <button class="action-btn" onclick="openBot('gen_video')">▶ Создать видео</button>
      </div>

      <button class="chat-button" onclick="openBot('add_chat')">💬 Добавить в чат</button>
    </div>
  </div>

  <div class="gallery-section">
    <div class="gallery-header">
      <span class="gallery-title">Фото и видео</span>
      <button class="gallery-link" onclick="openBot('gallery')">Показать все</button>
    </div>
    <div class="gallery-scroll" id="gallery-list"></div>
  </div>
</div>

<!-- SCREEN 2: ГЕНЕРАЦИЯ -->
<div id="screen-gen" class="screen">
  <div class="screen-title">Генерация</div>

  <div class="gen-card">
    <div class="gen-icon">🖼</div>
    <div class="gen-info">
      <h3>Создать фото</h3>
      <p>~30 токенов за генерацию</p>
    </div>
    <button class="btn-disabled">Скоро</button>
  </div>

  <div class="gen-card">
    <div class="gen-icon">🎬</div>
    <div class="gen-info">
      <h3>Создать видео</h3>
      <p>~150 токенов за генерацию</p>
    </div>
    <button class="btn-disabled">Скоро</button>
  </div>
</div>

<!-- SCREEN 3: ПРОФИЛЬ -->
<div id="screen-profile" class="screen">
  <div class="screen-title">Профиль</div>
  <p style="color: var(--text-dim); font-size: 14px;">Ваш профиль</p>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-agent" onclick="switchTab('agent')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    Агент
  </button>
  <button class="nav-btn" id="nav-gen" onclick="switchTab('gen')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="m21 15-5-5L5 21"/>
    </svg>
    Генерация
  </button>
  <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    Профиль
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const BOT = 'tmaTESTTEST_bot'
const CHANNEL = 'tmaTESTTEST_bot'
const SUPABASE_URL = 'https://mjmucxrozoytxanossvz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qbXVjeHJjem95dHhhbm9zc3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYzNTI5MzIsImV4cCI6MjA2MTkyODkzMn0.lIl6ibbr5CicrP72aU8-GcFUCVd2mKEUPSdK7HxJolM'

const GALLERY_ITEMS = [
  { icon: '⚡', label: 'Агент' },
  { icon: '✨', label: 'Генерация' },
  { icon: '👤', label: 'Профиль' },
]

// ── TELEGRAM ──────────────────────────────────────────────
const tg = window.Telegram?.WebApp
if (tg) { tg.ready(); tg.expand() }

const tgUser = tg?.initDataUnsafe?.user
const userId = tgUser?.id
const firstName = tgUser?.first_name || 'Пользователь'

// ── STATE ─────────────────────────────────────────────────
let balance = 0
let supabaseUserId = null

// ── TAB SWITCHING ─────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('screen-' + tab).classList.add('active')
  document.getElementById('nav-' + tab).classList.add('active')
}

// ── SUPABASE FETCH ────────────────────────────────────────
async function sbGet(table, params) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${params}`
  const r = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  if (!r.ok) return null
  return r.json()
}

// ── LOAD DATA ─────────────────────────────────────────────
async function loadData() {
  if (!userId) {
    document.getElementById('balance-display').textContent = '—'
    return
  }

  try {
    const users = await sbGet('users', `telegram_id=eq.${userId}&select=id,balance_tokens`)
    if (users && users.length > 0) {
      const user = users[0]
      balance = user.balance_tokens
      supabaseUserId = user.id
      document.getElementById('balance-display').textContent = balance
    }
  } catch(e) {
    console.error('Error loading data:', e)
  }

  renderGallery()
}

function renderGallery() {
  const el = document.getElementById('gallery-list')
  el.innerHTML = GALLERY_ITEMS.map(item => `
    <div class="gallery-item">
      <div class="gallery-item-img" style="display:flex;align-items:center;justify-content:center;background:#222;font-size:32px;">
        ${item.icon}
      </div>
      <div class="gallery-item-label">${item.label}</div>
    </div>
  `).join('')
}

// ── ACTIONS ───────────────────────────────────────────────
function sendMessage() {
  showToast('Сообщение отправлено')
}

function openBot(param) {
  tg?.openTelegramLink(`https://t.me/${BOT}?start=${param}`)
}

function doTopup() {
  openBot('topup')
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2000)
}

// ── INIT ──────────────────────────────────────────────────
loadData()
</script>
</body>
</html>
